<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            max-width: 1000px;
            aspect-ratio: 1000 / 659;
            position: relative;
            margin: auto;
        }

        img, svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
        }

        svg { opacity: 0; }
    </style>
</head>
<body>
    <h1>SVG as Image Map - Responsive</h1>
    <main>
        <div class="container">
            <img src="images/cats.png" alt="cats" id="cats">
            <svg width="1000" height="659" viewBox="0 0 1000 659" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="1000" height="659" fill="white"/>
                <rect x="224" y="329" width="161" height="318" fill="#D9D9D9" id="cat1"/>
                <rect x="420" y="329" width="161" height="318" fill="#D9D9D9" id="cat2"/>
                <rect x="622" y="329" width="161" height="318" fill="#D9D9D9" id="cat3"/>
            </svg>
        </div>
    </main>

    <script>
        document.querySelector('#cat1').addEventListener('pointerenter', function(){
            console.log('over cat 1');
        });

        document.querySelector('#cat2').addEventListener('pointerenter', function(){
            console.log('over cat 2');
        });

        document.querySelector('#cat3').addEventListener('pointerenter', function(){
            console.log('over cat 3');
        });
    </script>
</body>
</html>
