<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Map Example 1</title>
</head>
<body>

    <h1>Here is an image with a map</h1>

    <!-- Image Map Generated by http://www.image-map.net/ -->
<img src="images/cats.png" usemap="#image-map">

<map name="image-map">
    <area id="area1" coords="201,650,164,635,146,612,140,590,139,571,141,556,147,539,151,516,160,503,174,500,167,527,162,555,163,580,172,608,190,625,207,632,228,626,216,598,214,562,224,550,235,537,238,508,246,477,252,450,246,435,234,402,242,380,241,364,235,340,241,323,259,330,273,345,299,342,323,339,336,343,356,323,367,321,371,340,368,369,371,386,372,410,366,430,356,443,361,471,366,501,371,518,375,536,387,552,393,571,393,592,389,612,380,627,370,637,354,641,322,635,294,628,289,637,272,642,241,640,229,655,227,658,218,645,209,658" shape="poly">
    <area id="area2" coords="556,629,451,352" shape="rect">
</map>

<script>
    const area1 = document.querySelector('#area1');
    const area2 = document.querySelector('#area2');

    area1.addEventListener('mouseover', function(){
        console.log('mouse is over area 1');
    });

    area1.addEventListener('mouseout', function(){
        console.log('mouse has left area 1');
    });

    area2.addEventListener('mouseover', function(){
        console.log('mouse is over area 2');
    });

    area2.addEventListener('mouseout', function(){
        console.log('mouse has left area 2');
    });
</script>
    
</body>
</html>
