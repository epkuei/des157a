<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example 3</title>
    <style>
        main {
            height: 80vh;
            display: grid;
            place-content: center;
        }
        #dot {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: red;
            transition: background-color 500ms;
        }
    </style>
</head>
<body>
    <h1>Set Timeout Example 3</h1>
    <main>
        <div id="dot"></div>
    </main>

    <script>
        const dot = document.querySelector('#dot');
        function changeBox(){
            setTimeout( function(){
                dot.style.backgroundColor = 'green';
                setTimeout(function(){
                    dot.style.backgroundColor = 'blue';
                    setTimeout(function(){
                        dot.style.backgroundColor = 'orange';
                        setTimeout(function(){
                            dot.removeAttribute('style');
                            changeBox(); // recursion - call the function after the last timeout
                        }, 2000); // end timeout #4
                    }, 2000); // end timeout #3
                }, 2000); // end timeout #2
            }, 2000 ); // end timeout #1
        }

changeBox();
    </script>
    
</body>
</html>
